<!DOCTYPE html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <link rel="stylesheet" href="./src//styles/global.css" />
    <link rel="stylesheet" href="./src/styles/header.css" />
    <link rel="stylesheet" href="./src/styles/switch.css" />
    <link rel="stylesheet" href="./src/styles/card.css" />
    <link rel="stylesheet" href="./src/styles/social.css" />
    <link rel="stylesheet" href="./src/styles/footer.css" />
    <link rel="stylesheet" href="./src/styles/repos.css" />
    <link rel="stylesheet" href="./src/styles/modal.css" />

  </head>
  <body>
    <header class="header-container">
      <div class="hero-content">
        <img id="github-avatar" />
        <div class="hero-text">
          <h1></h1>
          <p class="subtitle"></p>
          <div id="githubLink"></div>
        </div>
      </div>

      <div class="theme-switch-wrapper">
        <span class="theme-label">Light</span>
        <label class="theme-switch" for="theme-toggle">
          <input type="checkbox" id="theme-toggle" />
          <span class="slider"></span>
        </label>
        <span class="theme-label">Dark</span>
      </div>

    </header>

    <main class="main-container">
      <h2 class="project-header">Repository Projects</h2>
      <section id="projects" class="projects-container"></section>

      <h2 id="subReposHeader" class="repo-header">Other Repositories</h2>
      <section id="subRepos" class="sub-repo-container"></section>
    </main>

    <!-- modal -->
    <div id="project-modal" class="modal">
      <div class="modal-content">
        <div class="modal-scroll">
          <div class="modal-header">
            <span id="modal-close">&times;</span>
            <h2 id="modal-title"></h2>
          </div>
  
          <div class="modal-body">
            <div class="modal-body-header-container">
              <div id="modal-project-info">
                <div>
                  <strong>
                    Field:
                  </strong>
                  <span id="modal-project-field"></span>
                </div>
                <span id="modal-project-status"></span>
              </div>
              <div id="modal-tech-stack"></div>
            </div>

            <p id="modal-description"></p>

            <strong class="modal-slider-title" id="modal-slider-title">Image Previews</strong>
            <div class="modal-slider-container" id="modal-slider-container">

              <button class="slider-btn" id="modal-prev">&#10094;</button>
  
              <div class="modal-slider">
                <div class="slider-track" id="modal-slider-track"></div>
              </div>
              
              <button class="slider-btn" id="modal-next">&#10095;</button>
            </div>
            <div class="slider-indicators" id="modal-indicators"></div>
  
          </div>
          
          <div class="modal-footer"></div>
        </div>

        <div class="modal-scroll-indicator">
          <div class="modal-scroll-progress"></div>
        </div>

      </div>
    </div>

    <!-- full image viewer -->
    <div id="image-viewer" class="image-viewer">
      <span id="viewer-close">&times;</span>
      <img id="viewer-img" src="" alt="Full view" />
    </div>

    <footer>
      <p>© 2025. This <a href="https://github.com/iyanarmanda/github-portfolio-api-template" target="_blank" rel="external noopener">GitHub Portfolio</a> Made by <a href="https://github.com/iyanarmanda/" target="_blank" rel="noopener">iyanarmanda</a></p>
    </footer>

    <button id="back-to-top" title="Back to Top">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-528 296-344l-56-56 240-240 240 240-56 56-184-184Z"/></svg>
    </button>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
